<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>りうけっと パンフレット - 表紙</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @page { size: A4 portrait; margin: 0; }

    html, body {
      width: 210mm;
      background: #f0f0f0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background-color: white;
      page-break-after: always;
      margin-bottom: 5mm;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 描いていただいたイラストをA4全体にぴったり表示します */
    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="pdf1riucket.png" alt="りうけっと 表紙">
  </div>
</body>
</html>
